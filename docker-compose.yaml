version: '3.8'

services:
  # 1. Backend API
  backend:
    build: ./backend-dashboard
    container_name: dashboard_api
    restart: always
    ports:
      - "3000:3000"
    
    extra_hosts:
      - "host.docker.internal:host-gateway"
   
    env_file:
      - ./backend-dashboard/.env 
    volumes:
      - ./backend-dashboard:/app
      - /app/node_modules

  # 2. Frontend Admin
  frontend-admin:
    build: ./frontend-admin
    container_name: dashboard_admin
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    volumes:
      - ./frontend-admin:/app
      - /app/node_modules

  # 3. Frontend Users
  frontend-users:
    build: ./frontend-users
    container_name: dashboard_users
    ports:
      - "5174:5174"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    volumes:
      - ./frontend-users:/app
      - /app/node_modules